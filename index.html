<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Taskmaster</title>
  <style>
    :root{
      --gold:#f5d24f;
      --dark:#120d12;
      --mid:#231421;
      --border:#b31e2f;
      --text:#fff2d2;
      --muted:#d7b766;
      --shadow:0 18px 40px rgba(0,0,0,.45);
      --glow:0 0 0 1px rgba(245,210,79,.18), 0 12px 28px rgba(0,0,0,.32);
    }
    *{box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    body{
      margin:0;
      font-family:"Avenir Next","Gill Sans","Trebuchet MS",sans-serif;
      color:var(--text);
      background:
        url('https://dqsrd8fqfc-glitch.github.io/Website/Image.png') center top / contain no-repeat fixed,
        #000;
    }
    button,input,textarea,select{font:inherit;max-width:100%}
    button{
      border:1px solid var(--border);
      background:linear-gradient(180deg,#d12c3f,#711724);
      color:var(--text);
      border-radius:10px;
      cursor:pointer;
      padding:8px 12px;
      line-height:1.2;
    }
    button:hover{filter:brightness(1.08)}
    button:disabled{opacity:.5;cursor:not-allowed;filter:none}
    input,textarea,select{
      width:100%;
      border:1px solid rgba(255,219,107,.3);
      background:#1a1018;
      color:var(--text);
      border-radius:8px;
      padding:8px 10px;
    }
    textarea{min-height:90px;resize:vertical}
    .page{
      width:100%;
      height:100vh;
      margin:0;
      padding:0;
      overflow:hidden;
    }
    .pubName{
      margin:0 0 14px;
    }
    .pubNameInput{
      width:100%;
      margin:0;
      padding:0;
      border:0;
      border-radius:0;
      background:transparent;
      font-size:clamp(28px,4vw,42px);
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:var(--gold);
      text-shadow:0 0 12px rgba(245,200,66,.25);
      box-shadow:none;
    }
    .pubNameInput:focus{
      outline:none;
      box-shadow:none;
    }
    .layout{
      display:flex;
      gap:0;
      align-items:flex-start;
      height:100vh;
      overflow:hidden;
    }
    .initiativeBar{
      display:flex;
      align-items:center;
      gap:10px;
      margin:0 0 14px;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:14px;
      background:linear-gradient(180deg, rgba(115,20,37,.96), rgba(26,14,24,.96));
      box-shadow:var(--shadow);
      overflow:auto;
    }
    .initiativeBar{display:none}
    .initiativeActions{
      margin-left:auto;
      display:flex;
      align-items:center;
      gap:10px;
      flex:0 0 auto;
    }
    .initiativeBar .label{
      color:var(--gold);
      font-weight:700;
      white-space:nowrap;
    }
    .initiativeTrack{
      display:flex;
      gap:8px;
      flex:1;
      min-width:0;
      overflow:auto;
      padding-bottom:2px;
    }
    .initChip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(245,200,66,.18);
      background:rgba(255,218,140,.06);
      white-space:nowrap;
    }
    .initNavBtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:40px;
      min-width:40px;
      padding:6px 0;
      border-radius:999px;
      border:1px solid rgba(245,200,66,.18);
      background:rgba(255,218,140,.06);
      line-height:1;
    }
    .initChip.active{
      background:linear-gradient(180deg,#f0c338,#9f1c2e);
      box-shadow:0 0 0 1px rgba(245,200,66,.35);
    }
    .mapCol{
      flex:1;
      min-width:0;
      position:relative;
      height:100vh;
      overflow:hidden;
    }
    .iconBtn{
      min-width:40px;
      width:40px;
      height:40px;
      padding:0;
      display:grid;
      place-items:center;
      font-size:17px;
      line-height:1;
    }
    .mapGhostBtn{
      position:fixed;
      top:14px;
      left:14px;
      width:112px;
      min-width:112px;
      height:64px;
      padding:0;
      z-index:80;
      opacity:.01;
      background:transparent;
      color:transparent;
      border-color:transparent;
      box-shadow:none;
      pointer-events:auto;
      touch-action:manipulation;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-size:15px;
      font-weight:700;
    }
    .mapGhostBtn.left{
      left:14px;
      right:auto;
    }
    .mapGhostBtn.right{
      left:auto;
      right:14px;
    }
    .mapGhostBtn:hover,
    .mapGhostBtn:focus-visible,
    body.taskLayoutEdit .mapGhostBtn{
      opacity:.08;
      background:rgba(255,218,140,.08);
      border-color:rgba(245,200,66,.14);
    }
    .mapToolsPanel{
      margin-top:14px;
    }
    .panelHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px 8px;
    }
    .panelHead h2{
      margin:0;
    }
    .miniIconBtn{
      width:32px;
      min-width:32px;
      height:32px;
      padding:0;
      border-radius:999px;
      font-size:17px;
      line-height:1;
      display:grid;
      place-items:center;
      background:rgba(255,218,140,.08);
      border:1px solid rgba(245,200,66,.2);
    }
    #layoutInfoBtn{display:none}
    body.taskLayoutEdit #layoutInfoBtn{display:grid}
    .leaderboardEditor{
      display:none;
      margin-top:10px;
      padding-top:10px;
      border-top:1px solid rgba(245,200,66,.12);
    }
    .leaderboardEditor.open{
      display:block;
    }
    .mapImageActions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .mapToolsPanel summary{
      list-style:none;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px 8px;
      color:var(--gold);
      font-size:17px;
      font-weight:700;
    }
    .mapToolsPanel summary::-webkit-details-marker{display:none}
    .mapToolsPanel summary::after{
      content:'▾';
      color:var(--muted);
      transition:transform .18s ease;
    }
    .mapToolsPanel[open] summary::after{transform:rotate(180deg)}
    .mapToolsPanel .panelBody{
      display:grid;
      gap:12px;
    }
    .hotspotToolbar{
      display:grid;
      gap:10px;
    }
    .filterPills{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .filterPill.active{
      background:linear-gradient(180deg,#6a4214,#38210c);
      box-shadow:0 0 0 1px rgba(245,200,66,.35);
    }
    .hotspotSections{
      display:grid;
      gap:14px;
    }
    .hotspotSection{
      display:grid;
      gap:10px;
    }
    .hotspotSectionHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      color:var(--gold);
      padding:0 2px;
    }
    .hotspotSectionHead h4{
      margin:0;
      font-size:15px;
    }
    .hotspotSectionHead .tiny{
      white-space:nowrap;
    }
    .hotspotMetaRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .hotspotMetaRow .chipWrap{
      align-items:center;
    }
    .sidebar{
      width:248px;
      position:fixed;
      top:255.5px;
      left:836.5px;
      display:flex;
      flex-direction:column;
      gap:12px;
      max-height:calc(100vh - 32px);
      overflow:auto;
      padding:0;
      margin:0;
      z-index:20;
    }
    .dragHandle{
      cursor:grab;
      touch-action:none;
    }
    .dragHandle.dragging{
      cursor:grabbing;
    }
    .panel{
      background:linear-gradient(180deg, rgba(111,19,37,.96), rgba(25,12,22,.96));
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .panel h2{
      margin:0;
      padding:12px 14px 8px;
      color:var(--gold);
      font-size:17px;
    }
    .panelBody{padding:0 14px 14px}
    .panelBody > *{min-width:0}
    .leaderboardShell{
      background:transparent;
      border:0;
      box-shadow:none;
      overflow:visible;
    }
    .leaderboardBody{
      padding:0;
    }
    .row2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    .tiny{font-size:12px;color:var(--muted)}
    .sidebarTabs{display:none}
    .sidebarTabBtn.active{
      background:linear-gradient(180deg,#6a4214,#38210c);
      box-shadow:0 0 0 1px rgba(245,200,66,.35);
    }
    .sideTab{display:none;flex-direction:column;gap:12px}
    .sideTab.active{display:flex}
    .mapSwitcher{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px}
    .mapMeta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;align-items:center;margin-top:8px}
    #mapC{
      position:relative;
      min-height:100vh;
      border:0;
      border-radius:0;
      overflow:hidden;
      background:transparent;
      box-shadow:none;
      touch-action:none;
      user-select:none;
    }
    #mapImg{
      display:none;
      width:100%;
      height:auto;
      vertical-align:top;
      pointer-events:none;
    }
    #bannerMask{
      display:none;
      position:absolute;
      inset:0 0 auto 0;
      height:108px;
      background:transparent;
      pointer-events:none;
      z-index:2;
    }
    #loadOverlay{
      position:absolute;
      inset:0;
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
      text-align:center;
      padding:24px;
      border:2px dashed rgba(245,200,66,.35);
      background:rgba(19,9,17,.72);
      z-index:7;
    }
    #loadOverlay.drag{background:rgba(45,26,10,.82)}
    #loadOverlay h3{margin:0;font-size:28px;color:var(--gold)}
    #loadOverlay p{margin:0;max-width:520px;color:var(--muted)}
    #hotspotLayer,#annotationLayer,#tokenLayer,#spotlightLayer{
      position:absolute;
      inset:0;
    }
    #hotspotLayer{z-index:3}
    #taskBoardLayer{
      position:absolute;
      inset:0;
      z-index:25;
      pointer-events:none;
      overflow:visible;
    }
    #annotationLayer{z-index:4;pointer-events:none}
    #tokenLayer{z-index:5;pointer-events:none}
    #spotlightLayer{z-index:6;pointer-events:none}
    .spotlightBeam{
      position:absolute;
      width:130px;
      height:130px;
      border-radius:999px;
      margin:-65px 0 0 -65px;
      background:radial-gradient(circle, rgba(245,200,66,.26) 0%, rgba(245,200,66,.12) 35%, rgba(245,200,66,0) 72%);
      border:1px solid rgba(245,200,66,.45);
      box-shadow:0 0 24px rgba(245,200,66,.28);
    }
    .hotspot{
      position:absolute;
      width:44px;
      height:44px;
      padding:0;
      transform:translate(-50%,-50%);
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(30,14,4,.78);
      border:2px solid rgba(245,200,66,.95);
      box-shadow:0 0 0 0 rgba(245,200,66,.55);
      animation:pulse 2s infinite;
      font-size:17px;
      line-height:1;
      text-align:center;
      overflow:hidden;
    }
    .hotspot.editing{cursor:grab;box-shadow:0 0 0 2px rgba(255,245,211,.2),0 0 18px rgba(245,200,66,.35)}
    .hotspot.creating{box-shadow:0 0 0 2px rgba(245,200,66,.5),0 0 22px rgba(245,200,66,.55)}
    .hotspot::after{
      content:attr(data-tip);
      position:absolute;
      bottom:calc(100% + 8px);
      left:50%;
      transform:translateX(-50%);
      white-space:nowrap;
      background:rgba(18,10,4,.92);
      border:1px solid var(--border);
      color:var(--text);
      border-radius:8px;
      padding:4px 8px;
      font-size:17px;
      opacity:0;
      pointer-events:none;
      transition:.18s;
    }
    .hotspot:hover::after{opacity:1}
    @keyframes pulse{
      0%{box-shadow:0 0 0 0 rgba(245,200,66,.4)}
      70%{box-shadow:0 0 0 14px rgba(245,200,66,0)}
      100%{box-shadow:0 0 0 0 rgba(245,200,66,0)}
    }
    .token{
      position:absolute;
      transform:translate(-50%,-50%);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
      touch-action:none;
      pointer-events:auto;
      cursor:grab;
    }
    .token.dragging{cursor:grabbing}
    .token *{cursor:inherit}
    .tokCore{
      position:relative;
      display:grid;
      place-items:center;
      color:#fff7da;
      font-weight:700;
      text-shadow:0 1px 2px rgba(0,0,0,.4);
      box-shadow:0 10px 22px rgba(0,0,0,.35);
      border:2px solid rgba(255,239,199,.55);
    }
    .playerTok .tokCore{
      width:42px;
      height:42px;
      border-radius:999px;
    }
    .npcTok .tokCore{
      width:38px;
      height:38px;
      border-radius:11px;
      background:linear-gradient(180deg,#9d7421,#5f3b0e);
      color:#231404;
    }
    .tokLabel{
      font-size:17px;
      padding:3px 7px;
      border-radius:999px;
      background:rgba(18,9,4,.92);
      border:1px solid rgba(245,200,66,.28);
      white-space:nowrap;
      max-width:120px;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .playerDisplay .npcSecret,
    .playerDisplay .dmOnly,
    .playerDisplay .hotspot::after{display:none!important}
    .flash{animation:flash .75s ease}
    @keyframes flash{
      0%,100%{filter:none}
      50%{filter:drop-shadow(0 0 18px rgba(245,200,66,.9)) brightness(1.25)}
    }
    .condDots{
      position:absolute;
      right:-6px;
      bottom:-6px;
      display:flex;
      gap:2px;
      flex-wrap:wrap;
      width:20px;
      justify-content:flex-end;
    }
    .condDot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--gold);
      border:1px solid rgba(24,9,3,.8);
    }
    .playerAdder{
      margin-top:0;
      border:1px solid rgba(245,200,66,.14);
      border-radius:12px;
      background:rgba(255,219,142,.04);
      overflow:hidden;
    }
    .teamAddWrap{
      display:flex;
      justify-content:flex-end;
      margin-bottom:8px;
    }
    .teamManagerList{
      display:grid;
      gap:8px;
    }
    .teamManageCard{
      display:grid;
      gap:8px;
      padding:10px;
      border-radius:14px;
      border:1px solid rgba(245,210,79,.16);
      background:rgba(255,219,142,.05);
    }
    .teamManageTop{
      display:grid;
      grid-template-columns:36px minmax(0,1fr) auto;
      gap:8px;
      align-items:center;
    }
    .teamManageColors{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:6px;
    }
    .teamSwatch{
      height:22px;
      border-radius:999px;
      border:2px solid transparent;
      padding:0;
    }
    .teamSwatch.sel{
      border-color:#fff2c1;
      box-shadow:0 0 0 2px rgba(245,200,66,.28);
    }
    .teamManageMembers{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }
    .teamManageAdd{
      display:grid;
      grid-template-columns:36px minmax(0,1fr) auto;
      gap:8px;
      align-items:center;
    }
    .memberEmojiBtn{
      width:36px;
      min-width:36px;
      height:36px;
      padding:0;
      border-radius:10px;
      display:grid;
      place-items:center;
      font-size:20px;
    }
    .playerAdder summary{
      list-style:none;
      cursor:pointer;
      padding:6px 10px;
      color:var(--gold);
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-size:17px;
    }
    .playerAdder summary::-webkit-details-marker{display:none}
    .playerAdder summary::after{
      content:'▾';
      color:var(--muted);
      transition:transform .18s ease;
    }
    .playerAdder[open] summary::after{transform:rotate(180deg)}
    .playerAdderBody{
      padding:0 10px 10px;
      border-top:1px solid rgba(245,200,66,.1);
    }
    .playerAdd{
      display:grid;
      grid-template-columns:1fr auto;
      gap:8px;
      margin-bottom:10px;
    }
    .colorRow{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      margin-bottom:10px;
    }
    .swatch{
      border:2px solid transparent;
      height:28px;
      border-radius:999px;
      padding:0;
    }
    .swatch.sel{border-color:#fff2c1;box-shadow:0 0 0 2px rgba(245,200,66,.45)}
    .plist,.nlist,.effectsList,.logList{display:flex;flex-direction:column;gap:6px;min-width:0}
    .prow,.nrow,.effectRow,.logRow,.deckRow{
      display:grid;
      gap:6px;
      align-items:center;
      background:rgba(255,219,142,.05);
      border:1px solid rgba(245,200,66,.14);
      border-radius:12px;
      padding:6px;
    }
    .prow{
      grid-template-columns:minmax(0,1fr);
      gap:4px;
      padding:7px 8px;
      position:relative;
      overflow:hidden;
      min-height:0;
      border-radius:10px;
    }
    .nrow{grid-template-columns:auto minmax(0,1fr)}
    .effectRow,.logRow,.deckRow{grid-template-columns:minmax(0,1fr) auto}
    .pchip,.nchip{
      width:28px;
      height:28px;
      padding:0;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:700;
      line-height:1;
      text-align:center;
      color:#fff8e7;
      border:2px solid rgba(255,240,206,.55);
      overflow:hidden;
    }
    .nchip{
      border-radius:10px;
      background:linear-gradient(180deg,#9d7421,#5f3b0e);
      color:#231404;
    }
    .pmeta,.nmeta,.effectMeta,.logMeta{min-width:0}
    .pmeta strong,.nmeta strong,.effectMeta strong,.logMeta strong{display:block;font-size:13px;line-height:1.15;overflow-wrap:anywhere}
    .pmeta span,.nmeta span,.effectMeta span,.logMeta span{display:block;font-size:11px;line-height:1.15;color:var(--muted);overflow-wrap:anywhere}
    .nmeta span{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .miniBtn{
      padding:2px 4px;
      min-width:24px;
      font-size:11px;
      line-height:1;
    }
    .teamMain{
      display:grid;
      grid-template-columns:auto minmax(0,1fr) auto;
      gap:6px;
      min-width:0;
      align-items:center;
    }
    .teamBadge{
      width:30px;
      height:30px;
      border-radius:999px;
      display:grid;
      place-items:center;
      font-size:17px;
      line-height:1;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.22);
      flex:none;
    }
    .teamLeft{
      display:grid;
      gap:4px;
      min-width:0;
    }
    .teamTop{
      display:grid;
      grid-template-columns:minmax(0,1fr);
      gap:6px;
      align-items:center;
      min-width:0;
    }
    .teamRight{
      display:grid;
      gap:6px;
      align-content:center;
      justify-items:end;
      min-width:58px;
    }
    .teamMemberAddWrap{
      position:absolute;
      right:9px;
      top:32px;
      display:grid;
      place-items:center;
    }
    .teamScore{
      min-width:54px;
      padding:4px 5px;
      border-radius:8px;
      text-align:center;
      background:rgba(10,8,10,.28);
      border:1px solid rgba(255,255,255,.22);
      box-shadow:none;
    }
    .teamScore strong{
      display:block;
      font-size:15px;
      line-height:1;
      color:var(--gold);
    }
    .teamScore span{
      display:block;
      margin-top:1px;
      font-size:7px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--muted);
    }
    .teamFields{
      display:grid;
      gap:4px;
      min-width:0;
    }
    .teamNameInput{
      width:100%;
      border:0;
      background:transparent;
      color:var(--text);
      padding:0;
    }
    .teamNameInput{
      font-weight:700;
      font-size:13px;
      line-height:1.1;
    }
    .teamControls{
      display:flex;
      gap:4px;
      align-items:center;
      justify-content:flex-end;
    }
    .memberChips{
      display:flex;
      gap:3px;
      flex-wrap:wrap;
      padding-right:0;
    }
    .memberChip{
      display:inline-flex;
      align-items:center;
      gap:3px;
      padding:2px 5px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.14);
      font-size:8px;
      line-height:1.1;
    }
    .memberChip .remove{
      border:0;
      background:transparent;
      color:var(--muted);
      padding:0;
      min-width:auto;
      cursor:pointer;
    }
    .scoreBtn{

    function describeAction(action){
      if (!action) return '';
      if (action.type === 'all_thirst_delta') return 'Applies thirst ' + (action.amount >= 0 ? '+' : '') + action.amount + ' to all players.';
      if (action.type === 'current_rule') return 'Sets the table rule to: ' + (action.text || '');
      if (action.type === 'all_condition') return 'Gives all players ' + (action.label || action.conditionKey) + '.';
      return '';
    }
    function applyEffectAction(effectId){
      const effect = sessionState.activeEffects.find((fx) => fx.id === effectId);
      if (!effect || !effect.action) return;
      pushHistory('Apply effect action');
      const action = effect.action;
      if (action.type === 'all_thirst_delta') {
        players.forEach((player) => {
          player.thirst = clamp(player.thirst + Number(action.amount || 0), 0, 10);
        });
        renderPlayers();
        addLog('Automatic effect', effect.title + ' changed all thirst by ' + action.amount + '.');
      } else if (action.type === 'current_rule') {
        sessionState.currentRule = action.text || '';
        addLog('Automatic effect', 'Table rule updated from ' + effect.title + '.');
      } else if (action.type === 'all_condition') {
        players.forEach((player) => {
          const bucket = ensureConditionBucket(player.id);
          if (!bucket.some((c) => c.key === action.conditionKey)) {
            bucket.push({
              key:action.conditionKey,
              label:action.label || action.conditionKey,
              icon:action.icon || '✦',
              color:action.color || '#f5c842'
            });
          }
        });
        renderPlayers();
        renderAllTokens();
        addLog('Automatic effect', effect.title + ' applied ' + (action.label || action.conditionKey) + ' to everyone.');

      scheduleSave();

    function restoreFromData(data){
      resetSessionBits();
      pubName = 'Taskmaster';
      spliceReplace(DRINKS, data.DRINKS || DRINKS);
      spliceReplace(NOMS, data.NOMS || NOMS);
      spliceReplace(SOCIALS, data.SOCIALS || SOCIALS);
      spliceReplace(HOTSEATS, data.HOTSEATS || HOTSEATS);
      spliceReplace(CHALLENGES, data.CHALLENGES || CHALLENGES);
      spliceReplace(CURSES, data.CURSES || CURSES);
      spliceReplace(GAMES, data.GAMES || GAMES);
      spliceReplace(ITEMS, data.ITEMS || ITEMS);
      maps = Array.isArray(data.maps) && data.maps.length
        ? data.maps.map((map, index) => ({
            id:map.id || uid('map'),
            name:map.name || (index === 0 ? 'Studio Floor' : ('Zone ' + (index + 1))),
            imageData:index === 0 || map.name === 'Studio Floor' || map.name === 'Main Room'
              ? DEFAULT_MAIN_MAP_IMAGE
              : (typeof map.imageData === 'string' && map.imageData ? map.imageData : ''),
            hotspots:Array.isArray(map.hotspots) && map.hotspots.length ? plainClone(map.hotspots) : cloneDefaultHotspots(),
            annotations:Array.isArray(map.annotations) ? map.annotations.map((ann) => ({ ...ann })) : [],
            playerTokPos:map.playerTokPos || {},
            npcTokPos:{}
          }))
        : [makeDefaultMap('Studio Floor')];
      activeMapId = data.activeMapId || maps[0].id;
      ensureMapSelection();
      if (!data.maps && Array.isArray(data.HOTSPOTS)) {
        const primary = currentMap();
        primary.hotspots = cloneDefaultHotspots().map((spot) => {
          const saved = data.HOTSPOTS.find((h) => h.id === spot.id);
          return saved ? { ...spot, ...saved } : { ...spot };
        });
      }
      players = Array.isArray(data.players) ? data.players.map((p) => ({
        id:p.id,
        name:p.name,
        emoji:normalizeTeamEmoji(p.emoji),
        members:normalizeTeamMembers(p.members),
        color:p.color,
        score:Number(p.score) || 0,
        thirst:clamp(Number(p.thirst) || 0, 0, 10),
        tokPos:Array.isArray(p.tokPos) ? [Number(p.tokPos[0]) || 50, Number(p.tokPos[1]) || 50] : [50,50]
      })) : [];
      if (!players.length) seedDefaultTeams();
      sortPlayersByScore();
      loadActiveMapState();
      pidCounter = Number(data.pidCounter) || pidCounter;
      if (data.sessionState) {
        sessionState.activeEffects = Array.isArray(data.sessionState.activeEffects) ? data.sessionState.activeEffects : [];
        sessionState.sessionLog = Array.isArray(data.sessionState.sessionLog) ? data.sessionState.sessionLog : [];
        sessionState.annotations = [];
        sessionState.playerConditions = data.sessionState.playerConditions || {};
        sessionState.deckState = data.sessionState.deckState || defaultDeckState();
        sessionState.currentRule = data.sessionState.currentRule || '';
        sessionState.timers = Array.isArray(data.sessionState.timers) ? data.sessionState.timers : [];
        sessionState.effectTemplates = Array.isArray(data.sessionState.effectTemplates) ? data.sessionState.effectTemplates : [];
        sessionState.initiativeIndex = Number(data.sessionState.initiativeIndex) || 0;
        sessionState.notes = typeof data.sessionState.notes === 'string' ? data.sessionState.notes : '';
      }
      Object.keys(DECK_META).forEach((key) => {
        if (!sessionState.deckState[key]) sessionState.deckState[key] = { draw:getDeck(key).map((_, index) => index), discard:[] };
        if (!Array.isArray(sessionState.deckState[key].draw)) sessionState.deckState[key].draw = getDeck(key).map((_, index) => index);
        if (!Array.isArray(sessionState.deckState[key].discard)) sessionState.deckState[key].discard = [];
        sessionState.deckState[key].draw = sessionState.deckState[key].draw.filter((i) => i >= 0 && i < getDeck(key).length);
        sessionState.deckState[key].discard = sessionState.deckState[key].discard.filter((i) => i >= 0 && i < getDeck(key).length);
        if (!sessionState.deckState[key].draw.length && !sessionState.deckState[key].discard.length) {
          sessionState.deckState[key].draw = getDeck(key).map((_, index) => index);
        }
      });
      spotlight = data.spotlight || { type:'', id:'' };
      playerDisplay = !!data.playerDisplay;
      sidebarPosition = normalizeSidebarPosition(defaultSidebarPosition());
      mapImageData = currentMap() && typeof currentMap().imageData === 'string'
        ? currentMap().imageData
        : (typeof data.mapImageData === 'string' ? data.mapImageData : '');
      if (!data.maps && mapImageData && currentMap()) currentMap().imageData = mapImageData;
      applyPlayerView();
      refreshMapImageAndLayers();
      renderPubName();

    function movePlayerOrder(id, delta){
      const index = players.findIndex((player) => player.id === id);
      if (index < 0) return;
      const targetIndex = clamp(index + delta, 0, players.length - 1);
      if (targetIndex === index) return;
      pushHistory('Reorder initiative');
      const [player] = players.splice(index, 1);
      players.splice(targetIndex, 0, player);
      if (sessionState.initiativeIndex === index) {
        sessionState.initiativeIndex = targetIndex;
      } else if (index < sessionState.initiativeIndex && targetIndex >= sessionState.initiativeIndex) {
        sessionState.initiativeIndex -= 1;
      } else if (index > sessionState.initiativeIndex && targetIndex <= sessionState.initiativeIndex) {
        sessionState.initiativeIndex += 1;
      }
      renderPlayers();
      renderInitiative();
      addLog('Task order', player.name + ' moved ' + (delta < 0 ? 'up' : 'down') + ' in the running order.');
      scheduleSave();
    }

        const dxPct = ((e.clientX - taskColumnDrag.startX) / taskColumnDrag.rect.width) * 100;
        const dyPct = ((e.clientY - taskColumnDrag.startY) / taskColumnDrag.rect.height) * 100;
        if (Math.abs(dxPct) > 0.2 || Math.abs(dyPct) > 0.2) taskColumnDrag.moved = true;
        if (taskColumnDrag.mode === 'resize') {
          next.w = clamp(taskColumnDrag.originW + dxPct, 12, 40);
        } else {

        if (liveCol) {
          liveCol.style.left = `${next.x}%`;
          liveCol.style.top = `${next.y}%`;
          liveCol.style.width = `${next.w}%`;
        }

      }

      const dxPct = ((e.clientX - drag.sm.x) / drag.rect.width) * 100;
      const dyPct = ((e.clientY - drag.sm.y) / drag.rect.height) * 100;
      if (Math.abs(dxPct) > 0.4 || Math.abs(dyPct) > 0.4) drag.moved = true;
      const left = clamp(drag.sp[0] + dxPct, 2, 98);

        if (liveCol) liveCol.classList.remove('dragging');

      const releasedId = drag.id;
      const releasedType = drag.type;
      if (drag.moved) pushHistory(releasedType === 'hotspot' ? 'Move hotspot' : 'Move token');

    function shuffleIndices(indices){
      const copy = [...indices];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }
    function rebuildDeckState(key){
      const all = getDeck(key).map((_, index) => index);
      const discard = sessionState.deckState[key].discard.filter((i) => all.includes(i));
      const draw = sessionState.deckState[key].draw.filter((i) => all.includes(i) && !discard.includes(i));
      const used = new Set([...draw, ...discard]);
      const missing = all.filter((i) => !used.has(i));
      sessionState.deckState[key].draw = [...draw, ...missing];
      sessionState.deckState[key].discard = discard;
      if (!sessionState.deckState[key].draw.length && sessionState.deckState[key].discard.length) {
        sessionState.deckState[key].draw = shuffleIndices(sessionState.deckState[key].discard);
        sessionState.deckState[key].discard = [];
      }
    }
    function drawFromDeckKey(key, opts){
      rebuildDeckState(key);
      const state = sessionState.deckState[key];
      if (!state.draw.length) {
        state.draw = getDeck(key).map((_, index) => index);
      }
      const index = state.draw.shift();
      state.discard.unshift(index);
      const card = getDeck(key)[index];
      const meta = DECK_META[key];
      const title = card ? (card.text || card.name) : 'Unknown';
      addLog('Drawn: ' + meta.label, (opts && opts.source ? opts.source + ' → ' : '') + title);
      renderQuickDecks();
      scheduleSave();
      return { type:meta.type, card, deckKey:key, cardIndex:index };
    }
    function drawByType(type, opts){
      if (type === 'random') {
        const pool = ['drink','nominate','social','hotseat','challenge','curse','game','item'];
        type = pool[Math.floor(Math.random() * pool.length)];
      }
      return drawFromDeckKey(TYPE_TO_DECK[type], opts);
    }

          openWheelModal(spot);
          return { type:'core', card:{ icon:'🎡', text:'Spinning Wheel', sub:'The wheel takes over this hotspot.' }, deckKey:'CORE', cardIndex:0 };
        }
        return { type:'core', card:{ icon:'✦', text:'Core hotspot', sub:'This hotspot triggers a built-in interaction.' }, deckKey:'CORE', cardIndex:0 };
      }
      const cards = normalizeHotspotCards(spot);
      if (!cards.length) return {
        type:'draw',
        card:{ icon:'✦', text:'No hotspot cards', sub:'Add cards to this hotspot to reveal custom outcomes.' },
        deckKey:'HOTSPOT',
        cardIndex:-1
      };
      const cardIndex = Math.floor(Math.random() * cards.length);
      const card = cards[cardIndex];
      addLog('Drawn: Hotspot Card', (opts && opts.source ? opts.source + ' → ' : '') + (card.text || 'Untitled card'));
      scheduleSave();
      return {
        type:'draw',
        card,
        deckKey:'HOTSPOT',
        cardIndex
      };
    }

    function drawWheel(segments){
      const canvas = document.getElementById('wheelCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const r = canvas.width / 2 - 14;
      const seg = (Math.PI * 2) / segments.length;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(wheelAngle);
      segments.forEach((item, i) => {
        const start = -Math.PI / 2 + i * seg;
        const end = start + seg;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, r, start, end);
        ctx.closePath();
        ctx.fillStyle = item.color;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,235,184,.35)';
        ctx.stroke();
        ctx.save();
        ctx.rotate(start + seg / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#f5e8c4';
        ctx.font = '18px Georgia';
        ctx.fillText(item.icon + ' ' + item.text, r - 14, 6);
        ctx.restore();
      });
      ctx.restore();
      ctx.fillStyle = '#f5c842';
      ctx.beginPath();
      ctx.moveTo(cx, 20);
      ctx.lineTo(cx - 16, 52);
      ctx.lineTo(cx + 16, 52);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx, cy, 44, 0, Math.PI * 2);
      ctx.fillStyle = '#2a1609';
      ctx.fill();
      ctx.lineWidth = 6;
      ctx.strokeStyle = '#f5c842';

      const target = wheelAngle + (Math.PI * 2 * (5 + Math.random() * 3));
      function ease(t){ return 1 - Math.pow(1 - t, 3); }

        const t = clamp((now - start) / duration, 0, 1);

          [copy[i], copy[j]] = [copy[j], copy[i]];

      const maze = Array.from({ length: size }, () => Array.from({ length: size }, randomPenalty));
      path.forEach(([x, y], index) => {
        maze[y][x] = index === path.length - 1 ? 'exit' : 'path';
      });
      const revealed = maze.map((row) => row.map(() => false));
      revealed[0][0] = true;
      let safeReveals = 1;
      let totalFingers = 0;
      let cellarFinished = false;
      openModal(`
        <div class="modalCard cellarShell">
          <h3>⬇ ${escapeHtml(spot.tip)}</h3>
          <p>You drop into a dark cellar passage. The floor ahead is hidden in blackness. Click tiles to reveal whether they are safe passage, 1 finger, or 2 fingers.</p>
          <div class="mazeBoard" id="cellarMaze"></div>
          <div id="cellarResult" class="revealCard">The entrance is visible. Click a tile to reveal what lies deeper in the darkness.</div>
        </div>
      `);
      const mazeEl = document.getElementById('cellarMaze');
      const resultEl = document.getElementById('cellarResult');
      const renderMaze = () => {
        mazeEl.innerHTML = '';
        maze.forEach((row, y) => {
          row.forEach((cell, x) => {
            const el = document.createElement('div');
            const isRevealed = revealed[y][x];
            el.className = 'mazeCell' + (isRevealed ? ' revealed ' + cell : ' hiddenCell');
            el.textContent = isRevealed
              ? (x === 0 && y === 0 ? '🚪' : cell === 'path' ? '■' : cell === 'penalty1' ? '1' : cell === 'penalty2' ? '2' : '🚪')
              : '';
            el.addEventListener('click', () => {
              if (revealed[y][x] || cellarFinished) return;
              revealed[y][x] = true;
              renderMaze();
              if (cell === 'path') {
                safeReveals += 1;
                addLog('Core hotspot', 'Cellar maze: safe path found.');
                resultEl.innerHTML = `<h4>Safe footing</h4><p>You found a way forward through the dark. ${safeReveals >= 5 ? 'A clear route is starting to emerge.' : 'Keep revealing tiles to piece the route together.'}</p><p>Total fingers drunk so far: ${totalFingers}.</p>`;
                return;
              }
              if (cell === 'penalty1') {
                totalFingers += 1;
                addLog('Core hotspot', 'Cellar maze: 1 finger.');
                resultEl.innerHTML = `<h4>Loose stone</h4><p>The step gives way underfoot. Drink 1 finger.</p><p>Total fingers drunk so far: ${totalFingers}.</p>`;
                return;
              }
              if (cell === 'penalty2') {
                totalFingers += 2;
                addLog('Core hotspot', 'Cellar maze: 2 fingers.');
                resultEl.innerHTML = `<h4>Something moves in the dark</h4><p>You stumble hard in the passage. Drink 2 fingers.</p><p>Total fingers drunk so far: ${totalFingers}.</p>`;
                return;
              }
              cellarFinished = true;
              addLog('Core hotspot', 'Cellar maze escaped.');
              resultEl.innerHTML = `
                <div class="cellarFlash">
                  <div>Total Penalties</div>
                  <div class="count">${totalFingers}</div>
                </div>
                <h4>You found the exit</h4>
                <p>A draft of air hits your face. You have uncovered the route out of the cellar.</p>
              `;
            });
            mazeEl.appendChild(el);
          });
        });
      };
      renderMaze();
    }

        else if (bias === 'bad') pool = Math.random() < 0.7 ? (badPool.length ? badPool : results) : (goodPool.length ? goodPool : results);
        return pool[Math.floor(Math.random() * pool.length)];
      };
      openModal(`

          <p>The chests are full of useful treasures and nasty surprises. Decide how boldly you open them.</p>

    function openBottleModal(){
      let queue = shuffleIndices(players.map((_, index) => index));
      let spinningBottle = false;
      let bottleRotation = -90;
      const seatMarkup = players.map((player, index) => {
        const angle = (-90 + ((Math.PI * 2) * index) / Math.max(players.length, 1));
        const x = 50 + Math.cos(angle) * 38;
        const y = 50 + Math.sin(angle) * 38;
        return `
          <div class="bottleSeat" data-player-id="${escapeAttr(player.id)}" style="left:${x.toFixed(2)}%;top:${y.toFixed(2)}%;">
            <div class="bottleSeatChip" style="background:${escapeAttr(player.color || '#6a4214')}">${escapeHtml(initials(player.name))}</div>
            <div class="bottleSeatName">${escapeHtml(player.name)}</div>
          </div>
        `;
      }).join('');
      openModal(`
        <div class="modalCard">
          <h3>🔄 Spotlight Spinner</h3>
          <p>Spin the pointer and let it land on a team. It will work through a shuffled order before repeating.</p>
          <div class="bottleArena">
            ${players.length ? seatMarkup : ''}
            <div id="bottleSpinner" class="bottleSpinner"></div>
            <div class="bottleHub"></div>
          </div>
          <div class="modalTools">
            <button id="bottleSpinBtn" type="button">Spin</button>
          </div>
          <div id="bottleResult" class="revealCard">${players.length ? 'Everyone steps back from the spinner.' : 'Add teams first so the spinner has someone to choose.'}</div>
        </div>
      `);
      const bottleEl = document.getElementById('bottleSpinner');
      const resultEl = document.getElementById('bottleResult');
      const spinBtn = document.getElementById('bottleSpinBtn');
      const clearActiveSeat = () => document.querySelectorAll('.bottleSeat.active').forEach((seat) => seat.classList.remove('active'));
      spinBtn.addEventListener('click', () => {
        if (!players.length || spinningBottle) return;
        if (!queue.length) queue = shuffleIndices(players.map((_, index) => index));
        const chosenIndex = queue.shift();
        const chosen = players[chosenIndex];
        const targetAngle = -90 + (360 * chosenIndex) / Math.max(players.length, 1);
        const extraTurns = 5 + Math.floor(Math.random() * 3);
        const delta = ((targetAngle - (bottleRotation % 360)) + 360) % 360;
        bottleRotation += (extraTurns * 360) + delta;
        spinningBottle = true;
        clearActiveSeat();
        spinBtn.disabled = true;
        resultEl.innerHTML = '<h4>Spinning...</h4><p>The bottle rattles across the tabletop.</p>';
        bottleEl.style.transform = `translateY(-50%) rotate(${bottleRotation}deg)`;
        const onDone = () => {
          bottleEl.removeEventListener('transitionend', onDone);
          spinningBottle = false;
          spinBtn.disabled = false;
          const chosenSeat = document.querySelector(`.bottleSeat[data-player-id="${chosen.id}"]`);
          if (chosenSeat) chosenSeat.classList.add('active');
          addLog('Core hotspot', 'Spotlight spinner chose ' + chosen.name + '.');
          resultEl.innerHTML = `<h4>${escapeHtml(chosen.name)}</h4><p>The spinner points their way.${queue.length ? ' ' + queue.length + ' teams remain in this round.' : ' Everyone has been chosen once; the next spin starts a fresh shuffle.'}</p>`;
        };
        bottleEl.addEventListener('transitionend', onDone, { once:true });
      });
    }

        const text = ann.text || '';
        if (!matchesSearch(text)) return;
        const card = document.createElement('div');
        card.className = 'editCard';
        card.innerHTML = `
          <div class="editRow">
            <button type="button" class="bigEmoji">${ann.icon || '📍'}</button>
            <input value="${escapeAttr(ann.text || '')}" placeholder="Marker text">
            <div class="subtle">${ann.left.toFixed(1)}%, ${ann.top.toFixed(1)}%</div>
            <button type="button" class="miniBtn">✕</button>
          </div>
        `;
        const input = card.querySelector('input');
        card.querySelector('.bigEmoji').addEventListener('click', (ev) => toggleEmojiPicker(ev.currentTarget, (emoji) => {
          pushHistory('Edit marker icon');
          ann.icon = emoji;
          renderAnnotations();
          renderAdmin();
          scheduleSave();
        }));
        input.addEventListener('focus', () => pushHistory('Edit marker text'), { once:true });
        input.addEventListener('input', () => {
          ann.text = input.value;
          renderAnnotations();
          scheduleSave();
        });
        card.querySelector('.miniBtn').addEventListener('click', () => {
          pushHistory('Delete marker');
          currentAnnotations().splice(index, 1);
          renderAnnotations();
          renderAdmin();
          scheduleSave();
        });
        wrap.appendChild(card);
      });
      els.adminContent.appendChild(wrap);
    }

    function openConditionModal(playerId){
      const player = getPlayerById(playerId);
      if (!player) return;
      openModal(`
        <div class="modalCard">
          <h3>${escapeHtml(player.name)} — Conditions</h3>
          <p>Toggle temporary conditions, protection, and table flags for this player.</p>
          <div class="modalTools">${playerEffectMenu(playerId)}</div>
        </div>
      `);
      els.mcontent.querySelectorAll('[data-cond]').forEach((btn) => {
        btn.addEventListener('click', () => {
          toggleCondition(playerId, btn.dataset.cond);
          closeModal();
        });
      });
    }
    function toggleCondition(playerId, condKey){
      const lib = CONDITION_LIBRARY.find((c) => c.key === condKey);
      if (!lib) return;
      pushHistory('Toggle condition');
      const bucket = ensureConditionBucket(playerId);
      const idx = bucket.findIndex((c) => c.key === condKey);
      if (idx >= 0) {
        bucket.splice(idx, 1);
        addLog('Condition removed', lib.label + ' cleared from ' + getEntityLabel('player', playerId) + '.');
      } else {
        bucket.push({ ...lib });
        addLog('Condition added', getEntityLabel('player', playerId) + ' gains ' + lib.label + '.');
      }
      renderPlayers();
      renderAllTokens();
      if (els.adminOverlay.style.display === 'flex') renderAdmin();
      scheduleSave();
    }

    function toggleEmojiPicker(anchor, onPick, emojis){
      const rect = anchor.getBoundingClientRect();
      pickerState = { onPick, anchor };
      els.emojiPicker.innerHTML = '';
      (emojis || EMOJIS).forEach((entry) => {
        const emoji = typeof entry === 'string' ? entry : entry.emoji;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'emojiBtn';
        btn.innerHTML = `<span class="emojiGlyph">${escapeHtml(emoji)}</span>`;
        btn.addEventListener('click', () => {
          if (pickerState && pickerState.onPick) pickerState.onPick(emoji);
          hideEmojiPicker();
        });
        els.emojiPicker.appendChild(btn);
      });
      els.emojiPicker.style.display = 'grid';
      els.emojiPicker.style.left = Math.max(12, Math.min(window.innerWidth - 360, rect.left)) + 'px';
      els.emojiPicker.style.top = Math.max(12, Math.min(window.innerHeight - 240, rect.bottom + 8)) + 'px';
    }
    function hideEmojiPicker(){
      els.emojiPicker.style.display = 'none';
      pickerState = null;
    }
    document.addEventListener('click', (e) => {
      if (els.emojiPicker.style.display !== 'grid') return;
      const clickedAnchor = pickerState && pickerState.anchor && (e.target === pickerState.anchor || pickerState.anchor.contains(e.target));
      if (!els.emojiPicker.contains(e.target) && !clickedAnchor) hideEmojiPicker();
    });

    function importSave(file){
      const reader = new FileReader();
      reader.onload = () => {
        try {
          pushHistory('Import save');
          restoreFromData(JSON.parse(reader.result));
          saveToStorage();
        } catch (err) {
          alert('Could not load that save file.');
        }
      };
      reader.readAsText(file);
    }
    function exportSave(){
      const blob = new Blob([JSON.stringify(buildSaveData(true), null, 2)], { type:'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'crossed-keys-save.json';
      a.click();
      URL.revokeObjectURL(url);
    }
    function loadMapFile(file){
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        pushHistory('Load board');
        mapImageData = reader.result;
        if (currentMap()) currentMap().imageData = mapImageData;
        refreshMapImageAndLayers();
        addLog('Board loaded', (currentMap() ? currentMap().name : 'The zone') + ' was changed.');
        scheduleSave();
      };
      reader.readAsDataURL(file);
    }
    function useDefaultMapImage(){
      pushHistory('Use default board');
      mapImageData = DEFAULT_MAIN_MAP_IMAGE;
      if (currentMap()) currentMap().imageData = mapImageData;
      refreshMapImageAndLayers();
      addLog('Board loaded', (currentMap() ? currentMap().name : 'The zone') + ' was set to the default Taskmaster board.');
      scheduleSave();
    }
    function addMap(){
      pushHistory('Add zone');
      saveActiveMapState();
      const map = makeDefaultMap('Task Lab');
      players.forEach((p, index) => {
        map.playerTokPos[p.id] = playerDefaultPos(index);
      });
      maps.push(map);
      activeMapId = map.id;
      loadActiveMapState();
      renderMapSwitcher();
      refreshMapImageAndLayers();
      if (els.adminOverlay.style.display === 'flex') renderAdmin();
      addLog('Zone added', map.name + ' is ready.');
      scheduleSave();
    }
    function renameMap(){
      const map = currentMap();
      if (!map) return;
      const name = window.prompt('Rename zone', map.name);
      if (!name || !name.trim()) return;
      pushHistory('Rename zone');
      map.name = name.trim();
      renderMapSwitcher();
      renderInlineHotspotEditor();
      if (els.adminOverlay.style.display === 'flex') renderAdmin();
      scheduleSave();
    }
    function deleteMap(){
      if (maps.length <= 1) return;
      const map = currentMap();
      if (!map) return;
      pushHistory('Delete zone');
      const idx = maps.findIndex((item) => item.id === map.id);
      maps.splice(idx, 1);
      activeMapId = maps[Math.max(0, idx - 1)].id;
      loadActiveMapState();
      renderMapSwitcher();
      refreshMapImageAndLayers();
      if (els.adminOverlay.style.display === 'flex') renderAdmin();
      addLog('Zone deleted', map.name + ' was removed.');
      scheduleSave();
    }

    if (els.mapChooserBtn) els.mapChooserBtn.addEventListener('click', openMapChooserModal);
    if (els.pubNameInput) {
      els.pubNameInput.addEventListener('input', (e) => {
        const nextName = e.target.value.trim();
        pubName = nextName || 'Taskmaster';
        renderPubName();
        scheduleSave();
      });
    }
    els.mapSelect.addEventListener('change', (e) => switchMap(e.target.value));
    els.addMapBtn.addEventListener('click', addMap);
    els.renameMapBtn.addEventListener('click', renameMap);
    els.deleteMapBtn.addEventListener('click', deleteMap);
    els.sessionTabBtn.addEventListener('click', () => {
      sidebarTab = 'session';
      renderSidebarTab();
    });
    els.adminTabBtn.addEventListener('click', () => {
      sidebarTab = 'admin';
      renderSidebarTab();
    });
    els.mapFile.addEventListener('change', (e) => loadMapFile(e.target.files[0]));
    ['dragenter','dragover'].forEach((type) => {
      els.loadOverlay.addEventListener(type, (e) => {
        e.preventDefault();
        els.loadOverlay.classList.add('drag');
      });
    });
    ['dragleave','drop'].forEach((type) => {
      els.loadOverlay.addEventListener(type, (e) => {
        e.preventDefault();
        els.loadOverlay.classList.remove('drag');
      });
    });
    els.loadOverlay.addEventListener('drop', (e) => {
      const file = [...e.dataTransfer.files].find((f) => f.type.startsWith('image/'));
      if (file) loadMapFile(file);
    });
    els.mapC.addEventListener('click', (e) => {
      if (playerDisplay) return;
      const target = e.target;
      if (target.closest('.token') || target.closest('.annotation') || target.closest('.hotspot') || target.id === 'loadOverlay') return;
      if (hotspotCreateMode) {
        const rect = els.mapC.getBoundingClientRect();
        const left = clamp(((e.clientX - rect.left) / rect.width) * 100, 2, 98);
        const top = clamp(((e.clientY - rect.top) / rect.height) * 100, 2, 98);
        pushHistory('Add hotspot');
        addHotspotAt(left, top);
        return;
      }
      if (!annotationMode) return;
      addAnnotationAt(e.clientX, e.clientY);
    });
    els.addPlayerBtn.addEventListener('click', addPlayer);
    els.playerName.addEventListener('keydown', (e) => { if (e.key === 'Enter') addPlayer(); });
    els.fillBtn.addEventListener('click', () => {
      pushHistory('Award everyone points');
      players.forEach((p) => { p.score = (Number(p.score) || 0) + 1; });
      sortPlayersByScore();
      renderPlayers();
      addLog('Round control', 'Every team gained 1 point.');
      scheduleSave();
    });
    els.sipBtn.addEventListener('click', () => {
      pushHistory('Deduct everyone points');
      players.forEach((p) => { p.score = (Number(p.score) || 0) - 1; });
      sortPlayersByScore();
      renderPlayers();
      addLog('Round control', 'Every team lost 1 point.');
      scheduleSave();
    });
    els.dmBtn.addEventListener('click', openAdmin);
    els.closeAdminBtn.addEventListener('click', closeAdmin);
    els.exportBtn.addEventListener('click', exportSave);
    els.manualSaveBtn.addEventListener('click', saveNow);
    if (els.leaderboardDragHandle && els.sidebar) {
      els.leaderboardDragHandle.addEventListener('pointerdown', (e) => {
        if (window.innerWidth <= 1100 || !taskLayoutEdit || e.button !== 0 || e.target.closest('button')) return;
        const rect = els.sidebar.getBoundingClientRect();
        sidebarDrag = {
          startX:e.clientX,
          startY:e.clientY,
          originX:rect.left,
          originY:rect.top,
          width:rect.width,
          height:rect.height,
          moved:false
        };
        els.leaderboardDragHandle.classList.add('dragging');
        els.leaderboardDragHandle.setPointerCapture(e.pointerId);
        e.preventDefault();
      });
    }
    if (els.taskLayoutBtn) els.taskLayoutBtn.addEventListener('click', openCardEditor);
    if (els.layoutToggleBtn) els.layoutToggleBtn.addEventListener('click', toggleTaskLayoutEdit);
    if (els.layoutInfoBtn) els.layoutInfoBtn.addEventListener('click', openLayoutInfo);
    if (els.teamEditToggleBtn) els.teamEditToggleBtn.addEventListener('click', toggleTeamEditor);
    els.importBtn.addEventListener('click', () => els.importFile.click());
    els.importFile.addEventListener('change', (e) => {
      if (e.target.files[0]) importSave(e.target.files[0]);
      e.target.value = '';
    });
    els.adminOverlay.addEventListener('click', (e) => {
      if (e.target === els.adminOverlay) closeAdmin();
    });
    els.undoBtn.addEventListener('click', undo);
    els.redoBtn.addEventListener('click', redo);
    els.initPrevBtn.addEventListener('click', () => {
      if (!players.length) return;
      pushHistory('Previous initiative');
      sessionState.initiativeIndex = (sessionState.initiativeIndex - 1 + players.length) % players.length;
      renderInitiative();
      scheduleSave();
    });
    els.playerViewBtn.addEventListener('click', togglePlayerView);
    els.runModeBtn.addEventListener('click', () => {
      adminMode = 'run';
      activeAdminTab = 'RUN';
      renderAdmin();
    });
    els.editModeBtn.addEventListener('click', () => {
      adminMode = 'edit';
      activeAdminTab = 'DRINKS';
      renderAdmin();
    });
    els.adminSearch.addEventListener('input', () => {
      adminSearch = els.adminSearch.value.trim();
      renderAdmin();
    });
    window.addEventListener('resize', () => {
      renderSidebarPosition();
      positionTaskLayoutButton();
    });

    renderColorChoices();
    resetSessionBits();
    loadFromStorage();
    renderEverything();
  </script>
</body>
</html>
